<svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Transactions: two opposing arrows representing send/receive -->
  <!-- Top arrow (right-pointing) -->
  <line x1="3" y1="9" x2="22" y2="9" stroke="#E5C46B" stroke-width="2" stroke-linecap="round"/>
  <polyline points="19,5 23,9 19,13" fill="none" stroke="#E5C46B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom arrow (left-pointing) -->
  <line x1="25" y1="19" x2="6" y2="19" stroke="#4FB848" stroke-width="2" stroke-linecap="round"/>
  <polyline points="9,15 5,19 9,23" fill="none" stroke="#4FB848" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pixel decoration dots -->
  <rect x="2" y="2" width="2" height="2" fill="#3E3E3E" rx="0.5"/>
  <rect x="24" y="2" width="2" height="2" fill="#3E3E3E" rx="0.5"/>
  <rect x="2" y="24" width="2" height="2" fill="#3E3E3E" rx="0.5"/>
  <rect x="24" y="24" width="2" height="2" fill="#3E3E3E" rx="0.5"/>
  <!-- Small hash marks for "data" feel -->
  <rect x="7" y="7" width="1" height="1" fill="#E5C46B" opacity="0.5"/>
  <rect x="11" y="7" width="1" height="1" fill="#E5C46B" opacity="0.5"/>
  <rect x="15" y="7" width="1" height="1" fill="#E5C46B" opacity="0.5"/>
  <rect x="12" y="21" width="1" height="1" fill="#4FB848" opacity="0.5"/>
  <rect x="16" y="21" width="1" height="1" fill="#4FB848" opacity="0.5"/>
  <rect x="20" y="21" width="1" height="1" fill="#4FB848" opacity="0.5"/>
</svg>
