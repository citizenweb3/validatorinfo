<svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Distribution: center node branching out to multiple endpoints -->
  <!-- Center circle -->
  <circle cx="14" cy="14" r="4" fill="#E5C46B" stroke="#3E3E3E" stroke-width="1"/>
  <!-- Pixel cross inside center -->
  <rect x="13" y="12" width="2" height="4" fill="#3E3E3E"/>
  <rect x="12" y="13" width="4" height="2" fill="#3E3E3E"/>
  <!-- Distribution lines -->
  <line x1="10.5" y1="11" x2="5" y2="5" stroke="#3E3E3E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17.5" y1="11" x2="23" y2="5" stroke="#3E3E3E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10.5" y1="17" x2="5" y2="23" stroke="#3E3E3E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17.5" y1="17" x2="23" y2="23" stroke="#3E3E3E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="18" x2="14" y2="25" stroke="#3E3E3E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Endpoint squares (pixel style) -->
  <rect x="2" y="2" width="4" height="4" rx="0.5" fill="#4FB848" stroke="#3E3E3E" stroke-width="0.5"/>
  <rect x="22" y="2" width="4" height="4" rx="0.5" fill="#4FB848" stroke="#3E3E3E" stroke-width="0.5"/>
  <rect x="2" y="22" width="4" height="4" rx="0.5" fill="#4FB848" stroke="#3E3E3E" stroke-width="0.5"/>
  <rect x="22" y="22" width="4" height="4" rx="0.5" fill="#4FB848" stroke="#3E3E3E" stroke-width="0.5"/>
  <rect x="12" y="24" width="4" height="3" rx="0.5" fill="#4FB848" stroke="#3E3E3E" stroke-width="0.5"/>
</svg>
