<svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Network nodes: hexagonal arrangement of connected nodes -->
  <!-- Connection lines -->
  <line x1="14" y1="4" x2="5" y2="10" stroke="#3E3E3E" stroke-width="1" stroke-linecap="round"/>
  <line x1="14" y1="4" x2="23" y2="10" stroke="#3E3E3E" stroke-width="1" stroke-linecap="round"/>
  <line x1="5" y1="10" x2="5" y2="18" stroke="#3E3E3E" stroke-width="1" stroke-linecap="round"/>
  <line x1="23" y1="10" x2="23" y2="18" stroke="#3E3E3E" stroke-width="1" stroke-linecap="round"/>
  <line x1="5" y1="18" x2="14" y2="24" stroke="#3E3E3E" stroke-width="1" stroke-linecap="round"/>
  <line x1="23" y1="18" x2="14" y2="24" stroke="#3E3E3E" stroke-width="1" stroke-linecap="round"/>
  <!-- Cross connections -->
  <line x1="5" y1="10" x2="23" y2="18" stroke="#3E3E3E" stroke-width="0.5" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="23" y1="10" x2="5" y2="18" stroke="#3E3E3E" stroke-width="0.5" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="14" y1="4" x2="14" y2="24" stroke="#3E3E3E" stroke-width="0.5" stroke-opacity="0.4" stroke-linecap="round"/>
  <!-- Node circles with pixel inner detail -->
  <!-- Top node -->
  <circle cx="14" cy="4" r="3" fill="#E5C46B" stroke="#3E3E3E" stroke-width="1"/>
  <rect x="13" y="3" width="2" height="2" fill="#3E3E3E"/>
  <!-- Left node -->
  <circle cx="5" cy="10" r="3" fill="#4FB848" stroke="#3E3E3E" stroke-width="1"/>
  <rect x="4" y="9" width="2" height="2" fill="#3E3E3E"/>
  <!-- Right node -->
  <circle cx="23" cy="10" r="3" fill="#4FB848" stroke="#3E3E3E" stroke-width="1"/>
  <rect x="22" y="9" width="2" height="2" fill="#3E3E3E"/>
  <!-- Bottom-left node -->
  <circle cx="5" cy="18" r="3" fill="#4FB848" stroke="#3E3E3E" stroke-width="1"/>
  <rect x="4" y="17" width="2" height="2" fill="#3E3E3E"/>
  <!-- Bottom-right node -->
  <circle cx="23" cy="18" r="3" fill="#4FB848" stroke="#3E3E3E" stroke-width="1"/>
  <rect x="22" y="17" width="2" height="2" fill="#3E3E3E"/>
  <!-- Bottom node -->
  <circle cx="14" cy="24" r="3" fill="#E5C46B" stroke="#3E3E3E" stroke-width="1"/>
  <rect x="13" y="23" width="2" height="2" fill="#3E3E3E"/>
</svg>
