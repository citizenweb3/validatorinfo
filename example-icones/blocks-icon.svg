<svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Stacked blockchain blocks in isometric pixel style -->
  <!-- Bottom block -->
  <rect x="4" y="18" width="12" height="8" rx="1" fill="#3E3E3E" stroke="#3E3E3E" stroke-width="0.5"/>
  <rect x="4.5" y="18.5" width="11" height="7" rx="0.5" stroke="white" stroke-opacity="0.3"/>
  <rect x="6" y="20" width="2" height="2" fill="#E5C46B"/>
  <rect x="9" y="20" width="2" height="2" fill="#E5C46B"/>
  <rect x="6" y="23" width="2" height="2" fill="#E5C46B"/>
  <rect x="9" y="23" width="2" height="2" fill="#E5C46B"/>
  <rect x="12" y="20" width="2" height="2" fill="#E5C46B"/>
  <!-- Middle block -->
  <rect x="8" y="10" width="12" height="8" rx="1" fill="#3E3E3E" stroke="#3E3E3E" stroke-width="0.5"/>
  <rect x="8.5" y="10.5" width="11" height="7" rx="0.5" stroke="white" stroke-opacity="0.3"/>
  <rect x="10" y="12" width="2" height="2" fill="#4FB848"/>
  <rect x="13" y="12" width="2" height="2" fill="#4FB848"/>
  <rect x="10" y="15" width="2" height="2" fill="#4FB848"/>
  <rect x="13" y="15" width="2" height="2" fill="#4FB848"/>
  <rect x="16" y="12" width="2" height="2" fill="#4FB848"/>
  <!-- Top block -->
  <rect x="12" y="2" width="12" height="8" rx="1" fill="#3E3E3E" stroke="#3E3E3E" stroke-width="0.5"/>
  <rect x="12.5" y="2.5" width="11" height="7" rx="0.5" stroke="white" stroke-opacity="0.3"/>
  <rect x="14" y="4" width="2" height="2" fill="#E5C46B"/>
  <rect x="17" y="4" width="2" height="2" fill="#E5C46B"/>
  <rect x="14" y="7" width="2" height="2" fill="#E5C46B"/>
  <rect x="17" y="7" width="2" height="2" fill="#E5C46B"/>
  <rect x="20" y="4" width="2" height="2" fill="#E5C46B"/>
  <!-- Chain links between blocks -->
  <line x1="14" y1="10" x2="14" y2="10" stroke="#E5C46B" stroke-width="1.5"/>
  <line x1="10" y1="18" x2="10" y2="18" stroke="#E5C46B" stroke-width="1.5"/>
</svg>
